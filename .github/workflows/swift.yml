name: Swift
on: [push, pull_request]
jobs:

  linux-sdl2:
    name: Linux (SDL2 port)
    runs-on: ubuntu-latest
    # swift:6.0 hits a PureSwift/SDL typed-throws compiler bug (closures passed as
    # `throws(SDLError)` fail to type-check under that toolchain); 6.1+ compiles it fine.
    container: swift:6.1
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Swift Version
      run: swift --version
    - name: Install SDL2 dependencies
      run: apt-get update -y && apt-get install -y libsdl2-dev libsdl2-mixer-dev pkg-config
    - name: Build
      run: swift build --package-path ports/SDL2 -c debug --product CelesteSDL2

  macos-sdl2:
    name: macOS (SDL2 port)
    runs-on: macos-15
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Swift Version
      run: swift --version
    - name: Install SDL2 dependencies
      run: brew install sdl2 sdl2_mixer
    - name: Build
      run: swift build --package-path ports/SDL2 -c debug --product CelesteSDL2

  darwin-ios:
    name: iOS (Swift Playground)
    runs-on: macos-15
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Xcode Version
      run: xcodebuild -version
    - name: Build CelesteMobile
      # No `-project`: this is a `.swiftpm` App Playground, not an Xcode project/workspace -
      # `xcodebuild` auto-detects it from the current directory, the same way it auto-detects a
      # plain `Package.swift`.
      run: |
        cd ports/Darwin/CelesteMobile.swiftpm
        xcodebuild build -scheme CelesteMobile -destination "generic/platform=iOS Simulator" \
          -skipPackagePluginValidation

  darwin-macos:
    name: macOS (Xcode)
    runs-on: macos-15
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Xcode Version
      run: xcodebuild -version
    - name: Build Celeste-macOS
      run: |
        xcodebuild build -project ports/Darwin/Celeste.xcodeproj -scheme Celeste-macOS \
          -configuration Debug -skipPackagePluginValidation

  darwin-tvos:
    name: tvOS (Xcode)
    runs-on: macos-15
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Xcode Version
      run: xcodebuild -version
    - name: Download tvOS platform
      run: xcodebuild -downloadPlatform tvOS
    - name: Build Celeste-tvOS
      run: |
        xcodebuild build -project ports/Darwin/Celeste.xcodeproj -scheme Celeste-tvOS \
          -configuration Debug -destination "generic/platform=tvOS Simulator" \
          -skipPackagePluginValidation

  n3ds:
    name: Nintendo 3DS (build + upload ROM)
    runs-on: macos-15
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # devkitPro's 3ds-dev group pulls in the ARM11 cross-compiler, libctru, and
    # the bin2s/3dsxtool/smdhtool tools ports/3DS/Makefile depends on.
    - name: Install devkitPro (3ds-dev)
      run: |
        curl -L https://github.com/devkitPro/pacman/releases/latest/download/devkitpro-pacman-installer.pkg -o /tmp/devkitpro-pacman-installer.pkg
        sudo installer -pkg /tmp/devkitpro-pacman-installer.pkg -target /
        sudo dkp-pacman -Sy --noconfirm
        sudo dkp-pacman -S --noconfirm 3ds-dev

    # Armv6-none-none-eabi Embedded stdlib support (matching this port's build target) needs a
    # recent-enough Swift toolchain; resolve "latest" nightly at run time rather than pinning a
    # date, since snapshots get pruned.
    - name: Install Swift nightly toolchain
      run: |
        curl -sL https://download.swift.org/development/xcode/latest-build.yml -o /tmp/latest-build.yml
        SNAPSHOT_DIR=$(awk -F': ' '/^dir:/{print $2}' /tmp/latest-build.yml)
        SNAPSHOT_PKG=$(awk -F': ' '/^download:/{print $2}' /tmp/latest-build.yml)
        curl -L "https://download.swift.org/development/xcode/${SNAPSHOT_DIR}/${SNAPSHOT_PKG}" -o /tmp/swift-toolchain.pkg
        sudo installer -pkg /tmp/swift-toolchain.pkg -target /
        TOOLCHAIN_DIR=$(ls -d /Library/Developer/Toolchains/swift-*.xctoolchain | head -1)
        echo "SWIFTC=$TOOLCHAIN_DIR/usr/bin/swiftc" >> "$GITHUB_ENV"

    - name: Build Celeste.3dsx
      env:
        DEVKITPRO: /opt/devkitpro
        DEVKITARM: /opt/devkitpro/devkitARM
      run: |
        export PATH="$DEVKITPRO/tools/bin:$DEVKITARM/bin:$PATH"
        make -C ports/3DS SWIFTC="$SWIFTC"

    - name: Upload ROM
      uses: actions/upload-artifact@v4
      with:
        name: celeste-3ds
        path: ports/3DS/Celeste.3dsx
        if-no-files-found: error

  ipod-rockbox-swift:
    name: iPod (Rockbox port, armv4t Embedded Swift)
    runs-on: macos-15
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # armv4t-none-none-eabi Embedded stdlib ships in swift-6.3.2-RELEASE and
    # newer; resolve the latest nightly the same way the 3DS job does.
    - name: Install Swift nightly toolchain
      run: |
        curl -sL https://download.swift.org/development/xcode/latest-build.yml -o /tmp/latest-build.yml
        SNAPSHOT_DIR=$(awk -F': ' '/^dir:/{print $2}' /tmp/latest-build.yml)
        SNAPSHOT_PKG=$(awk -F': ' '/^download:/{print $2}' /tmp/latest-build.yml)
        curl -L "https://download.swift.org/development/xcode/${SNAPSHOT_DIR}/${SNAPSHOT_PKG}" -o /tmp/swift-toolchain.pkg
        sudo installer -pkg /tmp/swift-toolchain.pkg -target /
        TOOLCHAIN_DIR=$(ls -d /Library/Developer/Toolchains/swift-*.xctoolchain | head -1)
        echo "SWIFTC=$TOOLCHAIN_DIR/usr/bin/swiftc" >> "$GITHUB_ENV"

    # Builds libceleste.a and runs the undefined-symbol allowlist audit --
    # fast, so this runs on every push/PR. The full celeste.rock link
    # (ipod-rockbox-full below) needs the arm-elf-eabi cross toolchain and
    # runs less often.
    - name: Build libceleste.a (armv4t) + symbol audit
      run: make -C ports/iPod swift SWIFTC="$SWIFTC"

  ipod-rockbox-full:
    name: iPod (Rockbox port, full celeste.rock)
    runs-on: ubuntu-22.04
    # The arm-elf-eabi toolchain build is the expensive part here (~30-40min
    # cold; the cache below makes warm runs a couple minutes). Keep it off
    # the per-PR critical path -- run on pushes to main and on demand.
    if: github.event_name != 'pull_request'
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install build prerequisites
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq build-essential texinfo flex bison wget curl \
          xz-utils bzip2 patch file ca-certificates zip automake autoconf libtool \
          libtool-bin perl python3

    # Same armv4t-none-none-eabi requirement as the swift-only job above,
    # just resolved against the Linux snapshot channel.
    - name: Install Swift nightly toolchain
      run: |
        curl -sL https://download.swift.org/development/ubuntu2204/latest-build.yml -o /tmp/latest-build.yml
        SNAPSHOT_DIR=$(awk -F': ' '/^dir:/{print $2}' /tmp/latest-build.yml)
        SNAPSHOT_PKG=$(awk -F': ' '/^download:/{print $2}' /tmp/latest-build.yml)
        curl -L "https://download.swift.org/development/ubuntu2204/${SNAPSHOT_DIR}/${SNAPSHOT_PKG}" -o /tmp/swift-toolchain.tar.gz
        mkdir -p /tmp/swift-toolchain
        tar -xzf /tmp/swift-toolchain.tar.gz -C /tmp/swift-toolchain --strip-components=1
        echo "SWIFTC=/tmp/swift-toolchain/usr/bin/swiftc" >> "$GITHUB_ENV"

    - name: Fetch pinned Rockbox checkout
      run: make -C ports/iPod rockbox-tree

    # rockboxdev.sh itself doesn't version its output, so the cache key is
    # pinned to the Rockbox checkout (which pins the toolchain versions it
    # builds) plus the pinned SHA already baked into the Makefile.
    - name: Cache arm-elf-eabi cross toolchain
      id: rbdev-cache
      uses: actions/cache@v4
      with:
        path: ~/rbdev
        key: rbdev-toolchain-ipodnano2g-${{ hashFiles('ports/iPod/rockbox/tools/rockboxdev.sh') }}

    - name: Build arm-elf-eabi cross toolchain
      if: steps.rbdev-cache.outputs.cache-hit != 'true'
      run: make -C ports/iPod toolchain

    # Rockbox's own dependency-generation step (tools/multigcc.pl) passes
    # every firmware/plugin source file as one shell argv. On GitHub-hosted
    # runners argv+environ is big enough to blow the kernel's exec limit
    # here ("Argument list too long" / E2BIG) -- not the PATH alone (that
    # fix wasn't enough on its own), the many GITHUB_*/RUNNER_*/ACTIONS_*
    # vars these runners inject. ports/iPod/Makefile's `rock` target resets
    # to a minimal environment (env -i) around just the nested `make rocks`
    # call that hits this, so no special handling is needed here.
    - name: Build celeste.rock
      run: make -C ports/iPod rock SWIFTC="$SWIFTC"

    - name: Upload celeste.rock
      uses: actions/upload-artifact@v4
      with:
        name: celeste-ipod-rock
        path: ports/iPod/build/celeste.rock
        if-no-files-found: error
